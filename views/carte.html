<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Carte - {{salon_name}}</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">

    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 20px; border: 2px solid #f39c12; max-width: 350px; margin: auto; }
        .qr-container { background: white; padding: 10px; display: inline-block; border-radius: 10px; margin-top: 20px; }
        h1 { color: #f39c12; }
        .points-box { font-size: 3rem; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{salon_name}}</h1>
        <p>Client : <strong>{{nom}}</strong></p>
        <div class="points-box" id="points-display">{{points}}</div>
        <p>POINTS FIDÉLITÉ</p>
        <div class="qr-container">
            <img src="{{qrCode}}" alt="Mon QR Code">
        </div>
    </div>

    <script>
        const socket = io();
        socket.emit('join-client-room', '{{id}}');
        socket.on('point-added', (data) => {
            document.getElementById('points-display').innerText = data.newPoints;
            alert("Félicitations ! Un point a été ajouté.");
        });
    </script>
</body>
</html>
