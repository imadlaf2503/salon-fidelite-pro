<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Carte - {{salon_name}}</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.png">

    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: linear-gradient(145deg, #1e1e1e, #2a2a2a); padding: 30px; border-radius: 25px; border: 1px solid #333; max-width: 350px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #f39c12; margin: 0; font-size: 1.5rem; }
        .points-box { font-size: 4rem; font-weight: bold; color: #f39c12; margin: 15px 0; }
        .qr-container { background: white; padding: 15px; display: inline-block; border-radius: 15px; }
        .instructions { color: #888; font-size: 0.8rem; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <h1>{{salon_name}}</h1>
        <p style="margin-bottom: 5px;">{{nom}}</p>
        <div class="points-box" id="points-display">{{points}}</div>
        <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: #f39c12;">Points Fidélité</p>
        
        <div class="qr-container">
            <img src="{{qrCode}}" alt="Mon QR Code" style="width: 150px; height: 150px;">
        </div>

        <div class="instructions">
            Pour garder votre carte :<br>
            Appuyez sur <img src="https://img.icons8.com/ios/20/ffffff/export.png"/> puis <strong>"Sur l'écran d'accueil"</strong>
        </div>
    </div>

    <script>
        const socket = io();
        socket.emit('join-client-room', '{{id}}');
        socket.on('point-added', (data) => {
            document.getElementById('points-display').innerText = data.newPoints;
        });
    </script>
</body>
</html>
